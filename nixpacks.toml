[phases.setup]
nixPkgs = ["php83", "php83Packages.composer", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.tokenizer"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "touch database/database.sqlite"
]

# Disable Node.js - using pre-built assets
[phases.build]
cmds = []

[start]
cmd = "php artisan config:cache && php artisan route:cache && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
